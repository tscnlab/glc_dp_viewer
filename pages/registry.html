<h1>GLC Registry</h1>

<p class="small">
  Source:
  <a href="https://tscnlab.github.io/glc-registry/registry.json"><code>registry.json</code></a>
</p>

<div id="app" class="small">Loading…</div>

<style>
  table { width: 100%; border-collapse: collapse; table-layout: auto; }
  th, td { padding: 10px 12px; border-bottom: 1px solid rgba(0,0,0,0.08); vertical-align: top; }
  th { text-align: left; font-weight: 700; }

  /* Column sizing */
  th.repo-col { width: 420px; }
  td.repo-col code {
    display: inline-block;
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  th.when-col { width: 240px; }
  td.when-col code { white-space: nowrap; }

  /* Grouping (two-row blocks) */
  tr.group-start td { border-top: 2px solid rgba(0,0,0,0.10); }
  tr.group-start td { padding-top: 14px; }
  tr.group-end td { padding-bottom: 14px; }

  /* Row label chips */
  .rowtag {
    display: inline-block;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.02em;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(0,0,0,0.06);
  }

  .pill { display:inline-block; padding:2px 10px; border-radius:999px; font-weight:700; font-size:12px; }
  .pass { background:#e7f7ef; color:#137a3a; }
  .fail { background:#fdecec; color:#b42318; }
  .unknown { background:#f2f2f2; color:#555; }

  .muted { opacity: 0.75; }
  .reports a { white-space: nowrap; }
</style>

<script>
(function () {
  const REGISTRY_URL = "https://tscnlab.github.io/glc-registry/registry.json";

  function pill(status) {
    const s = (status || "unknown").toLowerCase();
    const cls = s === "pass" ? "pass" : s === "fail" ? "fail" : "unknown";
    return `<span class="pill ${cls}">${s}</span>`;
  }

  function fmtUtc(ts) {
    if (!ts) return "";
    return ts
      .replace("T", " ")
      .replace(/\.\d+/, "")   // remove fractional seconds
      .replace("+00:00", " UTC");
  }

  function sha7(sha) {
    return sha ? String(sha).slice(0, 7) : "";
  }

  async function main() {
    const app = document.getElementById("app");
    const url = REGISTRY_URL + "?t=" + Date.now(); // cache-bust

    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status} fetching registry.json`);
    const data = await res.json();

    const rows = data.datasets || [];
    const updated = data.generated_at_utc || "";

    const html = `
      <p class="small">Registry updated: <code>${fmtUtc(updated)}</code> · Datasets: <code>${rows.length}</code></p>

      <table>
        <thead>
          <tr>
            <th class="repo-col">Dataset repository</th>
            <th>State</th>
            <th>Status</th>
            <th>Commit</th>
            <th class="when-col">Validated at</th>
            <th class="reports">Reports</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map((d, idx) => {
            const repo = d.repo || d.id || "";
            const repoUrl = d.repo ? `https://github.com/${d.repo}` : "#";

            const lp = d.latest_pass || null;   // latest passing snapshot
            const cur = d.current || null;      // most recent run

            const lpStatus = lp && lp.status ? lp.status : "unknown";
            const curStatus = cur && cur.status ? cur.status : "unknown";

            const lpSha = lp && lp.commit_sha ? lp.commit_sha : "";
            const curSha = cur && cur.commit_sha ? cur.commit_sha : "";

            const lpShaUrl = (d.repo && lpSha) ? `https://github.com/${d.repo}/commit/${lpSha}` : repoUrl;
            const curShaUrl = (d.repo && curSha) ? `https://github.com/${d.repo}/commit/${curSha}` : repoUrl;

            const lpWhen = lp && lp.timestamp_utc ? fmtUtc(lp.timestamp_utc) : "";
            const curWhen = cur && cur.timestamp_utc ? fmtUtc(cur.timestamp_utc) : "";

            const latestPassUrl = d.latest_pass_url || "";
            const currentUrl = d.current_url || "";

            // If there is no latest_pass (shouldn't happen if you're enforcing membership),
            // still render both rows as unknown rather than breaking.
            return `
                <tr class="group-start">
                    <td class="repo-col" rowspan="2">
                    <a href="${repoUrl}"><code>${repo}</code></a>
                    </td>

                    <td><span class="rowtag">Latest pass</span></td>

                    <td>${pill(lpStatus)}</td>

                    <td>
                    ${lpSha ? `<a href="${lpShaUrl}"><code>${sha7(lpSha)}</code></a>` : `<span class="muted">—</span>`}
                    </td>

                    <td class="when-col">
                    ${lpWhen ? `<code>${lpWhen}</code>` : `<span class="muted">—</span>`}
                    </td>

                    <td class="reports">
                    ${latestPassUrl ? `<a href="${latestPassUrl}">latest_pass.json</a>` : `<span class="muted">—</span>`}
                    </td>
                </tr>

                <tr class="group-end">
                    <td><span class="rowtag">Current</span></td>

                    <td>${pill(curStatus)}</td>

                    <td>
                    ${curSha ? `<a href="${curShaUrl}"><code>${sha7(curSha)}</code></a>` : `<span class="muted">—</span>`}
                    </td>

                    <td class="when-col">
                    ${curWhen ? `<code>${curWhen}</code>` : `<span class="muted">—</span>`}
                    </td>

                    <td class="reports">
                    ${currentUrl ? `<a href="${currentUrl}">validation.json</a>` : `<span class="muted">—</span>`}
                    </td>
                </tr>
                `;
          }).join("")}
        </tbody>
      </table>

      <p class="small" style="margin-top:12px;">
        Missing a dataset? Add it to <code>datasets.yml</code> in the registry repo and wait for the next scheduled run.
      </p>
    `;

    app.innerHTML = html;
  }

  main().catch(err => {
    console.error(err);
    document.getElementById("app").innerHTML =
      `<p style="color:#b42318;"><b>Failed to load registry</b><br/><code>${String(err)}</code></p>`;
  });
})();
</script>
