permalink: /registry/

<h1>GLC Registry</h1>

<p class="small">
  Source:
  <a href="https://tscnlab.github.io/glc-registry/registry.json"><code>registry.json</code></a>
</p>

<div id="app" class="small">Loading…</div>

<style>
  table.reg {
    width: 100%;
    border-collapse: collapse;
    table-layout: auto;
  }
  table.reg th, table.reg td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    vertical-align: top;
  }
  table.reg th {
    text-align: left;
    font-weight: 700;
    white-space: nowrap;
  }

  /* Column sizing */
  th.repo-col, td.repo-col { width: 420px; }
  th.lp-col, td.lp-col { width: 260px; }
  th.cur-col, td.cur-col { width: 320px; }
  th.links-col, td.links-col { width: 220px; }

  /* Repo truncation */
  td.repo-col a code {
    display: inline-block;
    max-width: 100%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    vertical-align: bottom;
  }

  /* Two-line cell blocks */
  .cell-stack { display: flex; flex-direction: column; gap: 6px; }
  .rowline { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .label { color: rgba(0,0,0,0.55); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; }
  .mono code { white-space: nowrap; }

  /* Status pills */
  .pill {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 12px;
    line-height: 1.6;
  }
  .pass { background: #e7f7ef; color: #137a3a; }
  .fail { background: #fdecec; color: #b42318; }
  .unknown { background: #f2f2f2; color: #555; }

  /* Links */
  .links a { white-space: nowrap; }
  .sep { color: rgba(0,0,0,0.35); margin: 0 6px; }

  /* Small meta line */
  .reg-meta { margin: 0 0 14px; }
  .reg-meta code { white-space: nowrap; }
</style>

<script>
(function () {
  const REGISTRY_URL = "https://tscnlab.github.io/glc-registry/registry.json";

  function pill(status) {
    const s = (status || "unknown").toLowerCase();
    const cls = s === "pass" ? "pass" : s === "fail" ? "fail" : "unknown";
    return `<span class="pill ${cls}">${s}</span>`;
  }

  function fmtUtc(ts) {
    if (!ts) return "";
    return ts
      .replace("T", " ")
      .replace(/\.\d+/, "")          // drop subseconds
      .replace("+00:00", " UTC")
      .replace(/:\d\d UTC$/, " UTC"); // drop seconds
  }

  function shortSha(sha) {
    return sha ? sha.slice(0, 7) : "";
  }

  function ghRepoUrl(repo) {
    return repo ? `https://github.com/${repo}` : "#";
  }

  function ghCommitUrl(repo, sha) {
    return (repo && sha) ? `https://github.com/${repo}/commit/${sha}` : ghRepoUrl(repo);
  }

  async function main() {
    const app = document.getElementById("app");
    const url = REGISTRY_URL + "?t=" + Date.now(); // cache-bust
    const res = await fetch(url, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status} fetching registry.json`);
    const data = await res.json();

    const rows = data.datasets || [];
    const updated = data.generated_at_utc || "";

    const html = `
      <p class="reg-meta small">
        Registry updated: <code>${fmtUtc(updated)}</code> · Datasets: <code>${rows.length}</code>
      </p>

      <table class="reg">
        <thead>
          <tr>
            <th class="repo-col">Dataset repository</th>
            <th class="lp-col">Latest pass</th>
            <th class="cur-col">Current</th>
            <th class="links-col">Reports</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(d => {
            const repo = d.repo || d.id || "";
            const repoUrl = ghRepoUrl(d.repo);

            const lp = d.latest_pass || {};
            const cur = d.current || {};

            const lpSha = lp.commit_sha || "";
            const lpSha7 = shortSha(lpSha);
            const lpCommitUrl = ghCommitUrl(d.repo, lpSha);
            const lpTime = fmtUtc(lp.timestamp_utc || "");

            const curStatus = cur.status || "unknown";
            const curSha = cur.commit_sha || "";
            const curSha7 = shortSha(curSha);
            const curCommitUrl = ghCommitUrl(d.repo, curSha);
            const curTime = fmtUtc(cur.timestamp_utc || "");

            const latestPassUrl = d.latest_pass_url || "";
            const currentUrl = d.current_url || "";

            // Optional: show validator version only if they differ (otherwise it’s noise)
            const lpV = lp.validator_version || "";
            const curV = cur.validator_version || "";
            const vNote = (lpV && curV && lpV !== curV)
              ? `<span class="label" title="Validator differs">validator</span> <code>${lpV} → ${curV}</code>`
              : "";

            return `
              <tr>
                <td class="repo-col">
                  <a href="${repoUrl}"><code>${repo}</code></a>
                </td>

                <td class="lp-col mono">
                  <div class="cell-stack">
                    <div class="rowline">
                      <span class="label">commit</span>
                      ${lpSha7 ? `<a href="${lpCommitUrl}"><code>${lpSha7}</code></a>` : `<code>—</code>`}
                    </div>
                    <div class="rowline">
                      <span class="label">validated</span>
                      <code>${lpTime || "—"}</code>
                    </div>
                  </div>
                </td>

                <td class="cur-col mono">
                  <div class="cell-stack">
                    <div class="rowline">
                      <span class="label">status</span>
                      ${pill(curStatus)}
                      ${vNote ? `<span class="sep">·</span>${vNote}` : ``}
                    </div>
                    <div class="rowline">
                      <span class="label">commit</span>
                      ${curSha7 ? `<a href="${curCommitUrl}"><code>${curSha7}</code></a>` : `<code>—</code>`}
                      <span class="sep">·</span>
                      <span class="label">validated</span>
                      <code>${curTime || "—"}</code>
                    </div>
                  </div>
                </td>

                <td class="links-col links">
                  ${latestPassUrl ? `<a href="${latestPassUrl}">latest_pass.json</a>` : `<span class="muted">latest_pass.json</span>`}
                  ${latestPassUrl && currentUrl ? `<span class="sep">·</span>` : ``}
                  ${currentUrl ? `<a href="${currentUrl}">validation.json</a>` : `<span class="muted">validation.json</span>`}
                </td>
              </tr>
            `;
          }).join("")}
        </tbody>
      </table>

      <p class="small" style="margin-top:12px;">
        Missing a dataset? Add it to <code>datasets.yml</code> in the registry repo and wait for the next scheduled run.
      </p>
    `;

    app.innerHTML = html;
  }

  main().catch(err => {
    console.error(err);
    document.getElementById("app").innerHTML =
      `<p style="color:#b42318;"><b>Failed to load registry</b><br/><code>${String(err)}</code></p>`;
  });
})();
</script>
